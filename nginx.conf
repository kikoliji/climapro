# nginx.conf — ClimaPro · Raspberry Pi
# Ubicació: /etc/nginx/sites-available/climapro
# Activa amb: sudo ln -s /etc/nginx/sites-available/climapro /etc/nginx/sites-enabled/
# Certificat SSL: sudo certbot --nginx -d el-teu-domini.com

# ─── Gzip ────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    server_name el-teu-domini.com www.el-teu-domini.com;
    return 301 https://$host$request_uri;
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name el-teu-domini.com www.el-teu-domini.com;

    root /var/www/climapro/dist;
    index index.html;

    # Certificats SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/el-teu-domini.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/el-teu-domini.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── index.html: mai en cache (SPA entry point) ────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    # ── Fitxers amb hash (JS/CSS/imatges): cache permanent ───────────────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Service worker FCM: sense cache ──────────────────────────────────
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
    }

    # ── Resta de fitxers estàtics ─────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── React Router: totes les rutes → index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Seguretat bàsica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
